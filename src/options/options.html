<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Options C411 Tools</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 25px; width: 450px; background: #111827; color: #f3f4f6; }
    h2 { color: #3b82f6; border-bottom: 2px solid #1f2937; padding-bottom: 15px; margin-top: 0; font-weight: 600; }
    .section-title { font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; color: #6b7280; margin: 25px 0 15px; font-weight: bold; }
    .field { margin-bottom: 20px; }
    label { display: block; font-size: 13px; margin-bottom: 8px; color: #9ca3af; }
    input { width: 100%; padding: 10px 12px; box-sizing: border-box; background: #1f2937; border: 1px solid #374151; color: #fff; border-radius: 6px; font-size: 14px; transition: border-color 0.2s; }
    input:focus { border-color: #3b82f6; outline: none; }
    .status { margin-top: 20px; font-size: 13px; height: 20px; text-align: center; }
    button { background: #2563eb; color: #fff; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: 600; width: 100%; font-size: 14px; transition: background 0.2s; }
    button:hover { background: #1d4ed8; }
    .hint { font-size: 11px; color: #6b7280; margin-top: 4px; }
  </style>
</head>
<body>
  <h2>Configuration</h2>
  
  <div class="section-title">Général</div>
  <div class="field">
    <label for="tmdb-key">Clé API TMDB</label>
    <input type="text" id="tmdb-key" spellcheck="false">
    <div class="hint">Utilisée pour la génération de BBCode via TMDB.</div>
  </div>

  <div class="section-title">Détection de triche</div>
  <div class="field">
    <label for="min-ratio">Seuil de ratio suspect</label>
    <input type="number" id="min-ratio" step="1">
    <div class="hint">Valeur par défaut: 25. Les torrents au-dessus seront analysés.</div>
  </div>

  <button id="save">Enregistrer les modifications</button>
  <div id="status" class="status"></div>

  <script type="module" src="./options.ts"></script>
</body>
</html>
